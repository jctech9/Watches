<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watches - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <header class="auth-header">
          <p class="eyebrow">Watches</p>
          <h1>Entrar na sua conta</h1>
          <p class="subtitle">Use seu usuário e senha para acessar.</p>
        </header>

        <form id="login-form" class="auth-form" novalidate autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <!-- Campos ocultos para capturar autofill do navegador e evitar sugestões nos campos visíveis -->
          <input type="text" name="prevent_autofill_username" id="prevent_autofill_username" autocomplete="username" style="position:absolute;left:-9999px;opacity:0;height:0;width:0;border:0;" aria-hidden="true" tabindex="-1">
          <input type="password" name="prevent_autofill_password" id="prevent_autofill_password" autocomplete="current-password" style="position:absolute;left:-9999px;opacity:0;height:0;width:0;border:0;" aria-hidden="true" tabindex="-1">
          <label for="email">Usuário</label>
          <input id="email" name="email" type="text" inputmode="email" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" required />

          <label for="password">Senha</label>
          <input id="password" name="password" type="password" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false" required minlength="6" />

          <button id="submit-button" type="submit">Entrar</button>
        </form>

        <section id="user-panel" class="user-panel hidden" aria-live="polite">
          <p id="welcome-message"></p>
          <button id="logout-button" type="button" class="ghost">Sair</button>
        </section>

        <section id="watches-panel" class="watches-panel hidden" aria-live="polite">
          <h2>Meus relógios de pulso</h2>

          <form id="watch-form" class="watch-form" novalidate autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <label for="brand">Marca</label>
            <input id="brand" name="brand" type="text" autocomplete="off" required />

            <label for="model">Modelo</label>
            <input id="model" name="model" type="text" autocomplete="off" required />

            <label for="purchase-date">Data da compra</label>
            <input
              id="purchase-date"
              name="purchaseDate"
              type="text"
              inputmode="numeric"
              maxlength="10"
              autocomplete="off"
              required
            />

            <label for="price">Preço (R$)</label>
            <input id="price" name="price" type="text" inputmode="decimal" maxlength="20" autocomplete="off" required />

            <label class="check-row" for="has-battery">
              <input id="has-battery" name="hasBattery" type="checkbox" />
              Usa bateria?
            </label>

            <label for="battery-duration">Duração da bateria</label>
            <input
              id="battery-duration"
              name="batteryDuration"
              type="text"
              autocomplete="off"
              disabled
            />

            <label for="last-battery-change-date">Data da última troca de bateria (opcional)</label>
            <input
              id="last-battery-change-date"
              name="lastBatteryChangeDate"
              type="text"
              inputmode="numeric"
              maxlength="10"
              autocomplete="off"
              disabled
            />

            <button id="watch-submit-button" type="submit">Salvar relógio</button>
          </form>

          <section>
            <h3>Lista de relógios</h3>
            <p id="watches-average-age" class="watch-summary"></p>
            <ul id="watches-list" class="watches-list"></ul>
          </section>
        </section>

        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
